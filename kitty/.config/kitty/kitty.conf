# Allow remote control so wal hooks can live-apply colors.
allow_remote_control yes

# Expose a predictable control socket so `kitty @` works from other shells.
listen_on unix:/tmp/kitty

# Font and sizing defaults (match Nerd Font install for glyphs).
font_family JetBrainsMono Nerd Font
font_size 13.0
line_height 1.05
adjust_line_height 0

# Add a bit of breathing room and keep window borders minimal.
window_padding_width 8
window_border_width 0
hide_window_decorations yes

# Custom tab bar renderer.
tab_bar_edge top
tab_bar_style custom
tab_bar_margin_height 0.0 0.0
tab_bar_margin_width 0.0

# Cursor and bell tweaks.
cursor_shape block
# Animate cursor motion with a subtle trail.
cursor_trail 1
enable_audio_bell no

# Load wal-generated colors (pywal + hooks).
include ~/.cache/wal/colors-kitty.conf

# Vim-friendly window and tab navigation (no tmux).
map ctrl+shift+enter new_window
map ctrl+shift+q close_window
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+] next_tab

# Session management.
map ctrl+shift+s>g goto_session ~/.config/kitty/sessions
map ctrl+shift+s>s save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions
map ctrl+shift+s>p goto_session -1
map ctrl+shift+s>c close_session
